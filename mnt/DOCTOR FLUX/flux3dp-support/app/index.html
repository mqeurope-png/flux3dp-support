<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Flux3dp Support</title>
  <script src="{{{appclient}}}"></script>
  <link rel="stylesheet" type="text/css" href="styles/style.css">
</head>
<body>
  <div id="app">
    <div class="header">
      <h2>Flux3dp Support</h2>
    </div>
    <p id="ticket-info">Cargando...</p>

    <div class="contacts">
      <p class="contacts-label">Reenviar a:</p>
      <label class="contact-option">
        <input type="checkbox" name="recipient" value="daniel.kao@flux3dp.com">
        <span>Daniel Kao</span>
      </label>
      <label class="contact-option">
        <input type="checkbox" name="recipient" value="daniel.chen@flux3dp.com">
        <span>Daniel Chen</span>
      </label>
      <label class="contact-option">
        <input type="checkbox" name="recipient" value="floriane@flux3dp.com">
        <span>Floriane Wang</span>
      </label>
    </div>

    <button id="forwardBtn" disabled>Reenviar conversacion</button>
    <div id="status"></div>
  </div>
  <script src="scripts/app.js"></script>
</body>
</html>
