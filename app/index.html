<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Flux3dp Support</title>
  <script src="{{{appclient}}}"></script>
  <link rel="stylesheet" type="text/css" href="styles/style.css">
</head>
<body>
  <div id="app">
    <div class="header">
      <h2>Flux3dp Support</h2>
    </div>
    <p id="ticket-info">Cargando...</p>

    <div class="contacts">
      <p class="contacts-label">Reenviar a:</p>
      <div id="contacts-list"></div>
    </div>

    <button id="forwardBtn" disabled>Reenviar conversacion</button>
    <div id="status"></div>
  </div>

  <!-- Modal overlay -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title">Reenviar conversación</span>
        <button id="modalClose" class="modal-close">&times;</button>
      </div>
      <div class="modal-recipients">
        <p class="label">Destinatarios:</p>
        <div id="modal-recipients-list"></div>
      </div>
      <div class="modal-message">
        <p class="label">Mensaje (opcional):</p>
        <textarea id="agentMessage" rows="4" placeholder="Escribe un mensaje para los destinatarios..."></textarea>
      </div>
      <div class="modal-actions">
        <button id="modalForwardBtn" class="btn btn-primary">Reenviar ahora</button>
        <button id="modalDraftBtn" class="btn btn-secondary">Guardar borrador</button>
      </div>
      <div id="modal-status"></div>
    </div>
  </div>

  <script src="scripts/app.js"></script>
</body>
</html>
