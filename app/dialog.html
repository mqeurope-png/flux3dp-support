<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Reenviar conversación</title>
  <script src="{{{appclient}}}"></script>
  <link rel="stylesheet" type="text/css" href="styles/dialog.css">
</head>
<body>
  <div id="dialog-app">
    <div class="contacts-section">
      <p class="label">Reenviar a:</p>
      <div id="contacts-list"></div>
    </div>

    <div class="canned-section hidden" id="canned-section">
      <p class="label">Respuesta predefinida:</p>
      <select id="cannedSelect">
        <option value="">— Selecciona una respuesta —</option>
      </select>
    </div>

    <div class="message-section">
      <p class="label">Mensaje para los destinatarios (opcional):</p>
      <textarea id="agentMessage" rows="5" placeholder="Escribe un mensaje personal..."></textarea>
    </div>

    <div class="actions">
      <button id="forwardBtn" class="btn btn-primary" disabled>Reenviar ahora</button>
      <button id="draftBtn" class="btn btn-secondary" disabled>Guardar borrador</button>
    </div>

    <div id="status"></div>
  </div>
  <script src="scripts/dialog.js"></script>
</body>
</html>
