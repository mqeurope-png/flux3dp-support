<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#0D47A1"/>
  <circle cx="32" cy="32" r="28" fill="#1565C0"/>

  <!-- Envelope body -->
  <rect x="12" y="20" width="28" height="20" rx="3" fill="white" opacity="0.95"/>

  <!-- Envelope flap (V shape) -->
  <path d="M12 21l14 10 14-10" stroke="#1565C0" stroke-width="1.5" fill="none"/>

  <!-- Envelope lines (content) -->
  <line x1="17" y1="32" x2="31" y2="32" stroke="#90CAF9" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="17" y1="35" x2="27" y2="35" stroke="#90CAF9" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Forward arrow -->
  <g transform="translate(36, 28)">
    <circle cx="10" cy="10" r="12" fill="#FF6F00"/>
    <path d="M7 10l8-5v3h4v4h-4v3z" fill="white"/>
  </g>

  <!-- Subtle shine -->
  <ellipse cx="24" cy="14" rx="12" ry="4" fill="white" opacity="0.1"/>
</svg>
